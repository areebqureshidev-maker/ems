<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row bg-primary ">
            <div class="col-12 py-3">
                <div class="d-flex align-items-center">
                    
                    <h3 class="text-white">EMS</h3>
                    <div class="ms-auto">
                        <p class="fw-800 text-white">Welcome Areeb</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <h4>Employee Registeration Form</h4>
            </div>
            <div class="col-12 mt-3">
                <form>
                    <div class="row">
                        <div class="col-4 mb-3">
                            <label>Name</label>
                            <input type="text" class="form-control" placeholder="Areeb"/>
                            <small class="text-danger">Name Is Required</small>
                        </div>
                        <div class="col-4 mb-3">
                            <label>Email</label>
                            <input type="text" class="form-control" placeholder="areeb@gmail.com"/>
                            <small class="text-danger">Email Is Required</small>
                        </div>
                        <div class="col-4 mb-3">
                            <label>Phone</label>
                            <input type="text" class="form-control" placeholder="+92 336 5478541"/>
                            <small class="text-danger">Phone Is Required</small>
                        </div>
                        <div class="col-12 mb-3 text-end">
                            <input type="button" value="Submit" class="btn btn-primary"/>
                        </div>
                    </div>
                </form>

            </div>
        </div>

        <div class="row mt-5">
            <div class="col-12">
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead class="bg-primary text-white">
                            <tr>
                                <th>S NO</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th class="text-end">Action</th>
                            </tr>

                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>Areeb</td>
                                <td>areeb@gmail.com</td>
                                <td>+92 336 5478541</td>
                                <td class="text-end">
                                    <button class="btn  btn-primary text-white">
                                    <i class="bi bi-pencil-square"></i></button>
                                    <button class="btn  btn-primary text-white">
                                    <i class="bi bi-trash-fill"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
